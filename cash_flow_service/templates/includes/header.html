{% load static %}
<header>
  <nav class="navbar navbar-light" style="background-color: white">
    <div class="container">
      <a class="navbar-brand" href="{% url 'transaction:index' %}">
        <img src="{% static 'img/logo.png' %}" width="30" height="30" class="d-inline-block align-top" alt="">
        Cash Flow Service
      </a>
      {% with request.resolver_match.view_name as view_name %}
        <ul class="nav  nav-pills">
          <div class="btn-group" role="group" aria-label="Навигация">
            {% if view_name != 'transaction:index' %}
              <a href="{% url 'transaction:index' %}" class="btn btn-primary">Главная</a>
            {% endif %}
            {% if view_name != 'transaction:directory-management' %}
              <a href="{% url 'transaction:directory-management' %}" class="btn btn-primary">Управление справочниками</a>
            {% endif %}
          </div>
        </ul>
      {% endwith %}
    </div>
  </nav>
</header>
